name: OpenDock deployment

on:
workflow_dispatch:
inputs:
app_slug:
description: "App slug to deploy"
required: true
type: string

```
  deployment_id:
    description: "OpenDock deployment id"
    required: true
    type: string

  callback_url:
    description: "OpenDock callback URL"
    required: true
    type: string

  callback_secret:
    description: "OpenDock callback signing secret"
    required: true
    type: string

  image:
    description: "Docker image"
    required: false
    type: string

  port:
    description: "Container port"
    required: false
    type: string

  ttl_minutes:
    description: "Time to live"
    required: false
    type: string
```

permissions:
contents: read

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Notify start
    run: |
      echo "Starting deployment"
      echo "App: ${{ inputs.app_slug }}"
      echo "Image: ${{ inputs.image }}"
      echo "Port: ${{ inputs.port }}"
      echo "TTL: ${{ inputs.ttl_minutes }}"

  - name: Simulate deployment
    run: |
      sleep 10

  - name: Notify complete
    run: |
      echo "Deployment complete"
```
